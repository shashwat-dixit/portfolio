stages:
  - test
  - build
  - deploy
  - sync

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: "/certs"

# --------------------------------------------------------------------------
# Test stage
# --------------------------------------------------------------------------

test:backend:
  stage: test
  image: golang:1.26-alpine
  script:
    - cd backend
    - go vet ./...
    - go build ./...
  rules:
    - changes:
        - backend/**/*

test:frontend:
  stage: test
  image: node:22-alpine
  before_script:
    - corepack enable && corepack prepare pnpm@11.1.2 --activate
    - cd web && pnpm install --frozen-lockfile --ignore-scripts && pnpm rebuild esbuild
  script:
    - pnpm build
  rules:
    - changes:
        - web/**/*

# --------------------------------------------------------------------------
# Build stage — Docker images
# --------------------------------------------------------------------------

build:backend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - docker build -t $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA -t $CI_REGISTRY_IMAGE/backend:latest ./backend
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE/backend:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/backend:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - backend/**/*

build:frontend:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  script:
    - >
      docker build
      --build-arg PUBLIC_API_URL=https://api.shashwatdixit.com
      --build-arg PUBLIC_POSTHOG_KEY=${PUBLIC_POSTHOG_KEY:-}
      --build-arg PUBLIC_POSTHOG_HOST=${PUBLIC_POSTHOG_HOST:-https://us.i.posthog.com}
      -t $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
      -t $CI_REGISTRY_IMAGE/frontend:latest
      ./web
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker push $CI_REGISTRY_IMAGE/frontend:$CI_COMMIT_SHORT_SHA
    - docker push $CI_REGISTRY_IMAGE/frontend:latest
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - web/**/*

# --------------------------------------------------------------------------
# Deploy stage — SSH to EC2 and update services
# --------------------------------------------------------------------------

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | ssh-add -
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_KNOWN_HOSTS" >> ~/.ssh/known_hosts
  script:
    - |
      ssh $DEPLOY_USER@$DEPLOY_HOST << 'EOF'
        cd ~/portfolio
        git pull origin main
        docker compose pull
        docker compose up -d --build --remove-orphans
        docker image prune -f
      EOF
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  environment:
    name: production
    url: https://shashwatdixit.com

# --------------------------------------------------------------------------
# Sync stage — trigger blog content sync after deploy
# --------------------------------------------------------------------------

trigger:sync:
  stage: sync
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -sf -X POST \
        -H "X-API-Key: $SYNC_API_KEY" \
        "https://api.shashwatdixit.com/api/sync"
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
  needs:
    - deploy
  allow_failure: true

# --------------------------------------------------------------------------
# Scheduled sync — runs weekly (configure in GitLab: Settings > CI/CD > Schedules)
# Set cron to: 30 3 * * 2 (Tuesday 9:00 AM IST / 3:30 AM UTC)
# --------------------------------------------------------------------------

scheduled:sync:
  stage: sync
  image: alpine:latest
  before_script:
    - apk add --no-cache curl
  script:
    - |
      curl -sf -X POST \
        -H "X-API-Key: $SYNC_API_KEY" \
        "https://api.shashwatdixit.com/api/sync"
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
